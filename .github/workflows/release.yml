name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub release
  id-token: write   # PyPI Trusted Publishing (OIDC)

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build Python wheels on all platforms with cibuildwheel
  # ──────────────────────────────────────────────────────────────────────────
  build-wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Publish wheels + sdist to PyPI via OIDC Trusted Publishing
  #    Setup required once on PyPI:
  #      Account → Publishing → Add publisher
  #      owner=asoss  repo=gorillats  workflow=release.yml  env=pypi
  # ──────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed: OIDC Trusted Publishing handles authentication.

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Publish Rust crates to crates.io
  #    Required secret: CARGO_REGISTRY_TOKEN
  #      crates.io → Account Settings → API Tokens → New token (publish-update)
  #      Add to: GitHub → Settings → Secrets → Actions → CARGO_REGISTRY_TOKEN
  # ──────────────────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish gorillats-sys
        run: cargo publish --manifest-path rust/gorillats-sys/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # crates.io index needs a moment to make gorillats-sys available.
      - name: Wait for index propagation
        run: sleep 20

      - name: Publish gorillats
        run: cargo publish --manifest-path rust/gorillats/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Validate Conan recipe locally (Conan Center submission is a manual PR)
  # ──────────────────────────────────────────────────────────────────────────
  validate-conan:
    name: Validate Conan recipe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: pip install conan

      - name: Detect default profile
        run: conan profile detect --force

      - name: Create package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          conan create . --version "$VERSION" --build=missing -s build_type=Release

      - name: Test package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          conan test test_package "gorillats/$VERSION" -s build_type=Release

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Create GitHub Release with source checksum (needed for conandata.yml)
  # ──────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [publish-pypi, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute source tarball SHA256
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -sSL "$URL" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download wheels for release assets
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.whl
          body: |
            ## Checksums

            Update `conandata.yml` after release:
            ```yaml
            sources:
              "${{ github.ref_name }}":
                url: "${{ steps.sha.outputs.url }}"
                sha256: "${{ steps.sha.outputs.sha256 }}"
            ```
